<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <!--
      viewport-fit=cover    : extends the page under iOS notch/home-indicator
                              so we can use env(safe-area-inset-*).
      user-scalable=no      : disables iOS Safari's double-tap-to-zoom and
                              pinch-zoom on the page chrome. Without this
                              flag, double-tap inside the app reliably
                              zooms in (user complaint L2).
      maximum-scale=1.0     : belt-and-braces for the same.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SensorLab" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
